<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    body { font-family: Arial, Helvetica, sans-serif; font-size: 13px; color: #1a1a1a; margin: 0; padding: 10px; }
    h2 { font-size: 14px; margin: 0 0 2px; }
    .muted { color: #777; font-size: 11px; }
    .sec { border: 1px solid #e3e3e3; border-radius: 6px; padding: 8px; margin: 8px 0; }
    .sec > .title { font-weight: bold; font-size: 12px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
    .row { display: flex; align-items: center; gap: 6px; padding: 2px 0; }
    .row .grow { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    select { font: inherit; padding: 4px 6px; border: 1px solid #ccc; border-radius: 4px; width: 100%; box-sizing: border-box; }
    textarea { font: 12px/1.35 Consolas, Menlo, monospace; padding: 6px; border: 1px solid #ccc; border-radius: 4px; width: 100%; box-sizing: border-box; resize: vertical; min-height: 120px; white-space: pre; }
    button { font: inherit; padding: 5px 10px; border: 1px solid #bbb; border-radius: 4px; background: #fff; cursor: pointer; }
    button.mini { padding: 1px 6px; font-size: 12px; line-height: 1.4; }
    button.primary { background: #1a73e8; color: #fff; border-color: #1a73e8; }
    button:disabled { opacity: .5; cursor: default; }
    .actions { display: flex; gap: 8px; margin-top: 10px; }
    .actions button { flex: 1; }
    #status { font-size: 11px; color: #1a73e8; min-height: 14px; margin-top: 6px; }
    #status.err { color: #c5221f; }
    #status.ok { color: #1e8e3e; }
    .statlist { max-height: 220px; overflow: auto; border: 1px solid #eee; border-radius: 4px; }
    .statlist .item { display: flex; justify-content: space-between; gap: 6px; padding: 3px 8px; border-bottom: 1px solid #f1f1f1; font-size: 11.5px; }
    .statlist .item:last-child { border-bottom: 0; }
    .statlist .item .nm { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .statlist .item .meta { color: #888; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .statlist .item.miss .nm { color: #b06000; }
    .summary { font-size: 11px; color: #555; margin: 4px 0 0; }
  </style>
</head>
<body>
  <h2>📥 Importar CSV — backup manual</h2>
  <div class="muted">Copie o CSV do Supabase, cole abaixo, escolha a tabela e importe. O upsert é por PK
    (re-colar não duplica; ordem/FK não importam).</div>

  <div class="sec">
    <div class="title">1) Tabela</div>
    <select id="table"></select>
  </div>

  <div class="sec">
    <div class="title">2) CSV colado</div>
    <textarea id="csv" placeholder="cole aqui o CSV (a 1ª linha deve ser o cabeçalho com os nomes das colunas)"></textarea>
    <div class="muted" id="csvHint" style="margin-top:4px">Delimitador detectado automaticamente (vírgula, tab ou ponto-e-vírgula).</div>
  </div>

  <div class="actions">
    <button class="primary" id="btnImport" onclick="doImport()">Importar</button>
    <button onclick="document.getElementById('csv').value=''; setStatus('', '')">Limpar</button>
  </div>
  <div id="status"></div>

  <div class="sec">
    <div class="title"><span>Controle de backups</span>
      <button class="mini" onclick="loadContext()" title="Recarregar status">🔄</button>
    </div>
    <div class="summary" id="summary">Carregando…</div>
    <div class="statlist" id="statlist"></div>
  </div>

  <script>
    var CTX = { tables: [] };

    function setStatus(msg, cls) {
      var el = document.getElementById('status');
      el.textContent = msg || '';
      el.className = cls || '';
    }

    function loadContext() {
      document.getElementById('summary').textContent = 'Carregando…';
      google.script.run
        .withSuccessHandler(renderContext)
        .withFailureHandler(function (e) { setStatus('Erro ao carregar: ' + e.message, 'err'); })
        .importContext();
    }

    function renderContext(ctx) {
      CTX = ctx || { tables: [] };
      var sel = document.getElementById('table');
      var prev = sel.value;
      sel.innerHTML = '';
      CTX.tables.forEach(function (t) {
        var o = document.createElement('option');
        o.value = t.key;
        o.textContent = (t.done ? '✅ ' : '◻️ ') + t.key + '  (PK: ' + t.pkLabel + ')';
        sel.appendChild(o);
      });
      if (prev) sel.value = prev;

      document.getElementById('summary').textContent =
        CTX.done + ' de ' + CTX.total + ' tabela(s) com backup · ' + (CTX.total - CTX.done) + ' faltando';

      var list = document.getElementById('statlist');
      list.innerHTML = '';
      CTX.tables.forEach(function (t) {
        var div = document.createElement('div');
        div.className = 'item' + (t.done ? '' : ' miss');
        var nm = document.createElement('span');
        nm.className = 'nm';
        nm.textContent = (t.done ? '✅ ' : '— ') + t.key;
        var meta = document.createElement('span');
        meta.className = 'meta';
        meta.textContent = t.done ? (t.rows + ' linhas · ' + t.when) : 'falta';
        div.appendChild(nm); div.appendChild(meta);
        list.appendChild(div);
      });
    }

    function doImport() {
      var table = document.getElementById('table').value;
      var csv = document.getElementById('csv').value;
      if (!table) { setStatus('Escolha uma tabela.', 'err'); return; }
      if (!csv.trim()) { setStatus('Cole o CSV primeiro.', 'err'); return; }
      var btn = document.getElementById('btnImport');
      btn.disabled = true;
      setStatus('Importando ' + table + '…', '');
      google.script.run
        .withSuccessHandler(function (res) {
          btn.disabled = false;
          setStatus('✅ ' + res.table + ': ' + res.inserted + ' inseridas, ' + res.updated +
            ' atualizadas' + (res.skipped ? ', ' + res.skipped + ' puladas (sem PK)' : '') +
            ' · total ' + res.totalNow + ' linhas (delim: ' + delimName(res.delimiter) + ')', 'ok');
          loadContext();
        })
        .withFailureHandler(function (e) {
          btn.disabled = false;
          setStatus('❌ ' + e.message, 'err');
        })
        .importCsv(table, csv);
    }

    function delimName(d) {
      if (d === '\t') return 'tab';
      if (d === ';') return 'ponto-e-vírgula';
      return 'vírgula';
    }

    loadContext();
  </script>
</body>
</html>
