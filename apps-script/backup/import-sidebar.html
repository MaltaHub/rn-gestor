<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <?!= include('styles') ?>
  <style>
    body { padding: 12px; }
    h2 { font-size: 15px; margin: 0 0 2px; }
    textarea { width: 100%; min-height: 130px; white-space: pre; }
    select { width: 100%; }
    .row .grow { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .actions { display: flex; gap: 8px; margin-top: 10px; }
    .actions button { flex: 1; }
    #status { font-size: 11.5px; min-height: 14px; margin-top: 6px; color: var(--primary-ink); }
    #status.err { color: var(--red); } #status.ok { color: var(--green); }
    .statlist { max-height: 240px; overflow: auto; border: 1px solid var(--border); border-radius: var(--radius-sm); }
    .statlist .item { display: flex; justify-content: space-between; gap: 6px; padding: 4px 9px; border-bottom: 1px solid var(--border); font-size: 11.5px; }
    .statlist .item:last-child { border-bottom: 0; }
    .statlist .item .nm { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .statlist .item .meta { color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
    .statlist .item.miss .nm { color: var(--amber); }
    .summary { font-size: 11.5px; color: var(--text-2); margin: 4px 0 0; }
  </style>
</head>
<body>
  <h2>📥 Importar CSV — backup manual</h2>
  <div class="muted">Copie o CSV do Supabase, cole abaixo, escolha a tabela e importe. O upsert é por PK
    (re-colar não duplica; ordem/FK não importam).</div>

  <div class="sec">
    <div class="title">1) Tabela</div>
    <select id="table"></select>
  </div>

  <div class="sec">
    <div class="title">2) CSV colado</div>
    <textarea id="csv" placeholder="cole aqui o CSV (a 1ª linha deve ser o cabeçalho com os nomes das colunas)"></textarea>
    <div class="muted" id="csvHint" style="margin-top:4px">Delimitador detectado automaticamente (vírgula, tab ou ponto-e-vírgula).</div>
  </div>

  <div class="sec" style="border-color:#f0c9a8;background:#fff8f1">
    <label class="row" style="cursor:pointer;align-items:flex-start">
      <input type="checkbox" id="replace" style="margin-top:2px">
      <span class="grow" style="white-space:normal">
        <b>Modo substituir (formata)</b><br>
        <span class="muted">Apaga da aba as linhas cuja PK <b>não</b> está no CSV — vira espelho exato.
        Sem isto, o import só adiciona/atualiza (nunca apaga).</span>
      </span>
    </label>
  </div>

  <div class="actions">
    <button class="primary" id="btnImport" onclick="doImport()">Importar</button>
    <button onclick="document.getElementById('csv').value=''; setStatus('', '')">Limpar</button>
  </div>
  <div id="status"></div>

  <div class="sec">
    <div class="title"><span>Controle de backups</span>
      <button class="mini" onclick="loadContext()" title="Recarregar status">🔄</button>
    </div>
    <div class="summary" id="summary">Carregando…</div>
    <div class="statlist" id="statlist"></div>
  </div>

  <script>
    var CTX = { tables: [] };

    function setStatus(msg, cls) {
      var el = document.getElementById('status');
      el.textContent = msg || '';
      el.className = cls || '';
    }

    function loadContext() {
      document.getElementById('summary').textContent = 'Carregando…';
      google.script.run
        .withSuccessHandler(renderContext)
        .withFailureHandler(function (e) { setStatus('Erro ao carregar: ' + e.message, 'err'); })
        .importContext();
    }

    function renderContext(ctx) {
      CTX = ctx || { tables: [] };
      var sel = document.getElementById('table');
      var prev = sel.value;
      sel.innerHTML = '';
      CTX.tables.forEach(function (t) {
        var o = document.createElement('option');
        o.value = t.key;
        o.textContent = (t.done ? '✅ ' : '◻️ ') + t.key + '  (PK: ' + t.pkLabel + ')';
        sel.appendChild(o);
      });
      if (prev) sel.value = prev;

      document.getElementById('summary').textContent =
        CTX.done + ' de ' + CTX.total + ' tabela(s) com backup · ' + (CTX.total - CTX.done) + ' faltando';

      var list = document.getElementById('statlist');
      list.innerHTML = '';
      CTX.tables.forEach(function (t) {
        var div = document.createElement('div');
        div.className = 'item' + (t.done ? '' : ' miss');
        var nm = document.createElement('span');
        nm.className = 'nm';
        nm.textContent = (t.done ? '✅ ' : '— ') + t.key;
        var meta = document.createElement('span');
        meta.className = 'meta';
        meta.textContent = t.done ? (t.rows + ' linhas · ' + t.when) : 'falta';
        div.appendChild(nm); div.appendChild(meta);
        list.appendChild(div);
      });
    }

    function doImport() {
      var table = document.getElementById('table').value;
      var csv = document.getElementById('csv').value;
      var replace = document.getElementById('replace').checked;
      if (!table) { setStatus('Escolha uma tabela.', 'err'); return; }
      if (!csv.trim()) { setStatus('Cole o CSV primeiro.', 'err'); return; }
      if (replace && !confirm('MODO SUBSTITUIR em "' + table + '":\n\nVai APAGAR da aba toda linha cuja PK não esteja no CSV colado.\nUse só se o CSV for a tabela COMPLETA.\n\nConfirmar?')) return;
      var btn = document.getElementById('btnImport');
      btn.disabled = true;
      setStatus((replace ? 'Substituindo ' : 'Importando ') + table + '…', '');
      google.script.run
        .withSuccessHandler(function (res) {
          btn.disabled = false;
          setStatus('✅ ' + res.table + ': ' + res.inserted + ' inseridas, ' + res.updated +
            ' atualizadas' + (res.removed ? ', ' + res.removed + ' removidas' : '') +
            (res.skipped ? ', ' + res.skipped + ' puladas (sem PK)' : '') +
            ' · total ' + res.totalNow + ' linhas (delim: ' + delimName(res.delimiter) + ')', 'ok');
          loadContext();
        })
        .withFailureHandler(function (e) {
          btn.disabled = false;
          setStatus('❌ ' + e.message, 'err');
        })
        .importCsv(table, csv, replace);
    }

    function delimName(d) {
      if (d === '\t') return 'tab';
      if (d === ';') return 'ponto-e-vírgula';
      return 'vírgula';
    }

    loadContext();
  </script>
</body>
</html>
