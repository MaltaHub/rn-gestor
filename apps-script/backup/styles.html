<style>
  /* ===== Design system compartilhado (incluído via <?!= include('styles') ?>) ===== */
  :root {
    --bg: #f6f8fc; --surface: #ffffff; --surface-2: #f2f5fb;
    --text: #1f2733; --text-2: #5a6b82; --muted: #8a97ab;
    --border: #e4e9f2; --border-2: #d5deec;
    --primary: #2563eb; --primary-ink: #1d4ed8; --primary-soft: #eaf1ff;
    --green: #16a34a; --green-soft: #e9f9ef;
    --red: #dc2626; --red-soft: #fdecec;
    --amber: #d97706; --amber-soft: #fef3e2;
    --shadow: 0 6px 24px rgba(23,42,74,.10);
    --shadow-lg: 0 16px 48px rgba(23,42,74,.22);
    --radius: 10px; --radius-sm: 7px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; font-family: var(--font); font-size: 13px; color: var(--text); background: var(--bg); -webkit-font-smoothing: antialiased; }
  h1, h2, h3 { margin: 0; font-weight: 700; letter-spacing: -0.01em; }
  a { color: var(--primary-ink); }
  .muted { color: var(--muted); font-size: 11.5px; }
  .text-2 { color: var(--text-2); }

  /* App bar (topo) */
  .appbar { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: linear-gradient(180deg,#1e293b,#111827); color: #fff; flex-wrap: wrap; }
  .appbar .brand { font-weight: 800; letter-spacing: .2px; display: inline-flex; align-items: center; gap: 7px; font-size: 14px; }
  .appbar select, .appbar input { background: rgba(255,255,255,.12); color: #fff; border: 1px solid rgba(255,255,255,.22); }
  .appbar select option { color: #111; }
  .appbar input::placeholder { color: rgba(255,255,255,.7); }
  .appbar .lbl { color: rgba(255,255,255,.82); display: inline-flex; align-items: center; gap: 5px; font-size: 12px; }

  /* Superfícies */
  .surface { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
  .sec { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin: 10px 0; }
  .sec > .title { font-weight: 700; font-size: 12.5px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; color: var(--text); }

  /* Botões */
  button, .btn { font: inherit; font-weight: 600; padding: 7px 13px; border: 1px solid var(--border-2); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); cursor: pointer; transition: background .12s, border-color .12s, box-shadow .12s, transform .04s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
  button:hover:not(:disabled), .btn:hover { background: var(--surface-2); border-color: var(--border-2); }
  button:active:not(:disabled) { transform: translateY(1px); }
  button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(37,99,235,.28); border-color: var(--primary); }
  button.primary, .btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
  button.primary:hover:not(:disabled) { background: var(--primary-ink); }
  button.ghost { background: transparent; border-color: transparent; color: var(--text-2); }
  button.ghost:hover:not(:disabled) { background: rgba(148,163,184,.16); }
  button.danger { color: var(--red); border-color: #f0b9b9; background: var(--red-soft); }
  button.success { color: #fff; background: var(--green); border-color: var(--green); }
  button.mini { padding: 3px 8px; font-size: 12px; }
  button:disabled, .btn.disabled { opacity: .5; cursor: default; }
  .btn.chip-btn { border-color: #b9dcc0; background: var(--green-soft); color: #14683a; }

  /* Inputs */
  input, select, textarea { font: inherit; padding: 6px 9px; border: 1px solid var(--border-2); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); }
  input[type=search] { padding-left: 9px; }
  textarea { font-family: var(--mono); font-size: 12px; line-height: 1.45; resize: vertical; }
  label { color: var(--text-2); }

  /* Pills / badges */
  .pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 999px; background: var(--primary-soft); color: var(--primary-ink); font-weight: 700; font-size: 11.5px; }
  .pill b { background: var(--primary); color: #fff; border-radius: 999px; padding: 0 6px; min-width: 18px; text-align: center; }
  .pill.amber { background: var(--amber-soft); color: var(--amber); }
  .badge { display: inline-flex; align-items: center; justify-content: center; min-width: 16px; height: 16px; padding: 0 5px; border-radius: 999px; background: var(--red); color: #fff; font-size: .66rem; font-weight: 800; }
  .chip { border: 1px solid var(--border); background: var(--surface-2); border-radius: 999px; padding: 3px 11px; font-size: 11.5px; }
  .chip b { color: var(--primary-ink); }

  /* Toasts */
  #toasts { position: fixed; right: 16px; bottom: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
  .toast { min-width: 220px; max-width: min(420px, 90vw); padding: 10px 13px; border-radius: var(--radius); background: #111827; color: #fff; box-shadow: var(--shadow-lg); font-size: 12.5px; display: flex; align-items: center; gap: 8px; animation: toast-in .25s cubic-bezier(.16,1,.3,1); }
  .toast.ok { background: #10241a; border-left: 3px solid var(--green); }
  .toast.err { background: #2a1414; border-left: 3px solid var(--red); }
  .toast.info { background: #111827; border-left: 3px solid var(--primary); }
  @keyframes toast-in { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  /* Spinner */
  .spin { width: 15px; height: 15px; border: 2px solid rgba(148,163,184,.4); border-top-color: var(--primary); border-radius: 50%; display: inline-block; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-cover { position: absolute; inset: 0; background: rgba(246,248,252,.6); display: none; align-items: center; justify-content: center; gap: 8px; z-index: 5; color: var(--text-2); }
  .loading-cover.on { display: flex; }

  /* Empty state */
  .empty { text-align: center; color: var(--muted); padding: 34px 16px; }
  .empty .big { font-size: 30px; margin-bottom: 6px; }

  /* Scrollbar fina */
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-thumb { background: #c6d0e0; border-radius: 8px; border: 3px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: #aab7cc; }

  .row { display: flex; align-items: center; gap: 8px; }
  .grow { flex: 1; }
</style>
