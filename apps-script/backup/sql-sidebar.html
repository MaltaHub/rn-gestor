<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <?!= include('styles') ?>
  <style>
    body { padding: 14px; }
    .head { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .head h2 { font-size: 16px; }
    textarea#sql { width: 100%; min-height: 360px; padding: 10px; white-space: pre; margin-top: 10px; }
    .sum { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="head"><h2>🧾 SQL das alterações manuais</h2><span class="grow"></span><span class="pill amber" id="pending">…</span></div>
  <div class="muted">Backup reverso (Sheets → Supabase). Net por PK: a última operação vence
    (ex.: 3 deletes em CARROS → 3 DELETEs). Revise antes de rodar no Supabase.</div>

  <div class="sec">
    <div class="toolbar">
      <button class="primary" id="gen">⚙️ Gerar SQL</button>
      <button id="copy" disabled>📋 Copiar</button>
      <button id="mark" disabled title="Marca as pendentes como já incluídas (não some com elas — só evita regerar)">✔️ Marcar incluídas</button>
      <label class="lbl" style="color:var(--text-2)"><input type="checkbox" id="all"> incluir já aplicadas</label>
    </div>
    <div class="sum" id="summary"></div>
  </div>

  <textarea id="sql" placeholder="Clique em “Gerar SQL”." spellcheck="false"></textarea>
  <div id="toasts"></div>

  <script>
    function toast(msg, type) {
      var box = document.getElementById('toasts'); var el = document.createElement('div');
      el.className = 'toast ' + (type || 'info'); el.textContent = msg; box.appendChild(el);
      setTimeout(function () { el.style.transition = 'opacity .3s'; el.style.opacity = '0'; setTimeout(function () { el.remove(); }, 300); }, type === 'err' ? 5000 : 2400);
    }
    function loadCtx() {
      google.script.run.withSuccessHandler(function (ctx) {
        document.getElementById('pending').innerHTML = '✎ pendentes <b style="background:var(--amber);color:#fff;border-radius:999px;padding:0 6px">' + ctx.pending + '</b>';
        var box = document.getElementById('summary'); box.innerHTML = '';
        var keys = Object.keys(ctx.summary).sort();
        if (!keys.length) { box.innerHTML = '<span class="muted">Nenhuma alteração pendente. ✅</span>'; return; }
        keys.forEach(function (t) {
          var s = ctx.summary[t]; var chip = document.createElement('span'); chip.className = 'chip';
          chip.innerHTML = '<b>' + t + '</b> · ' + (s.INSERT ? s.INSERT + 'I ' : '') + (s.UPDATE ? s.UPDATE + 'U ' : '') + (s.DELETE ? s.DELETE + 'D' : '');
          box.appendChild(chip);
        });
      }).withFailureHandler(function (e) { toast(e.message, 'err'); }).manualSqlContext();
    }
    document.getElementById('gen').addEventListener('click', function () {
      var b = document.getElementById('gen'); b.disabled = true; b.innerHTML = '<span class="spin"></span> gerando…';
      google.script.run.withSuccessHandler(function (res) {
        b.disabled = false; b.textContent = '⚙️ Gerar SQL';
        document.getElementById('sql').value = res.sql;
        document.getElementById('copy').disabled = !res.statements;
        document.getElementById('mark').disabled = !res.changes;
        toast(res.changes + ' alteração(oes) → ' + res.statements + ' statement(s).', 'ok');
      }).withFailureHandler(function (e) { b.disabled = false; b.textContent = '⚙️ Gerar SQL'; toast(e.message, 'err'); }).manualGenerateSql(document.getElementById('all').checked);
    });
    document.getElementById('copy').addEventListener('click', function () {
      var ta = document.getElementById('sql'); ta.select();
      try { document.execCommand('copy'); toast('📋 Copiado.', 'ok'); } catch (e) { toast('Selecione e copie (Ctrl+C).', 'err'); }
    });
    document.getElementById('mark').addEventListener('click', function () {
      if (!confirm('Marcar todas as pendentes como INCLUÍDAS?\n\nContinuam no histórico (backup reverso), só não são geradas de novo.')) return;
      google.script.run.withSuccessHandler(function (r) { toast(r.marked + ' marcada(s).', 'ok'); loadCtx(); document.getElementById('mark').disabled = true; })
        .withFailureHandler(function (e) { toast(e.message, 'err'); }).manualMarkIncluded();
    });
    loadCtx();
  </script>
</body>
</html>
